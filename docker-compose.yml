services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    network_mode: "host"
    volumes:
      # Mount backend source for hot-reload during development
      - ./backend:/app/backend
      # Mount model class definitions so new models are available without rebuild
      - ./training/src/models:/app/training/src/models:ro
      - ./training/src/features:/app/training/src/features:ro
      - ./training/src/workers:/app/training/src/workers:ro
      # Mount trained checkpoints so the container does not rely on baked image copies
      - ./training/models:/app/training/models:ro
    environment:
      - ENABLE_POKER_ROUTER=1
      - ENABLE_POKER_PRELOAD=0
      - REDIS_URL=redis://127.0.0.1:6379
    # --reload watches for file changes and auto-restarts uvicorn
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    network_mode: "host"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
